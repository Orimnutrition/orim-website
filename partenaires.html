<!DOCTYPE html>
<html lang="fr">

<title>ORIM™ — Réseau Mondial Partenaires</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03080f;--teal:#00d4aa;--teal2:#00b4d8;--gold:#c9a84c;
  --membrane:#00ffcc;--cell2:#7b2fff;--cell3:#ff6b35;
  --white:#f0faff;--gray:#7090aa;--panel:#07151f;
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Inter',system-ui,sans-serif;color:var(--white);}
#canvas-wrapper{position:fixed;inset:0;z-index:0;}
canvas#globe{display:block;width:100%!important;height:100%!important;}

/* ── TOP BAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:.7rem 1.5rem;
  background:rgba(3,8,15,.8);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,212,170,.12);
}
.logo-text{font-size:1.3rem;font-weight:700;letter-spacing:.1em;
  background:linear-gradient(135deg,var(--teal),var(--teal2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:.6rem;letter-spacing:.22em;color:var(--gray);margin-left:.3rem;vertical-align:middle;-webkit-text-fill-color:var(--gray);}
#search-box{
  display:flex;align-items:center;gap:.6rem;
  background:rgba(0,212,170,.07);border:1px solid rgba(0,212,170,.2);
  border-radius:2rem;padding:.4rem 1rem;width:260px;
}
#search-box input{background:none;border:none;outline:none;color:var(--white);font-size:.82rem;width:100%;}
#search-box input::placeholder{color:var(--gray);}
.search-icon{color:var(--teal);font-size:.9rem;}
#controls-right{display:flex;gap:.5rem;align-items:center;}
.ctrl-btn{
  background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);
  color:var(--teal);padding:.4rem .8rem;border-radius:.5rem;
  font-size:.72rem;cursor:pointer;transition:all .2s;letter-spacing:.06em;
}
.ctrl-btn:hover{background:rgba(0,212,170,.2);border-color:var(--teal);}
.ctrl-btn.active{background:rgba(0,212,170,.25);border-color:var(--teal);color:var(--white);}

/* ── FILTER BAR ── */
#filterbar{
  position:fixed;top:56px;left:0;right:0;z-index:49;
  display:flex;gap:.5rem;padding:.5rem 1.5rem;
  background:rgba(3,8,15,.7);backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,212,170,.08);
  overflow-x:auto;scrollbar-width:none;
}
#filterbar::-webkit-scrollbar{display:none;}
.filter-chip{
  display:flex;align-items:center;gap:.35rem;white-space:nowrap;
  background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.15);
  color:var(--gray);padding:.3rem .9rem;border-radius:2rem;
  font-size:.72rem;cursor:pointer;transition:all .2s;flex-shrink:0;
}
.filter-chip:hover{border-color:rgba(0,212,170,.4);color:var(--white);}
.filter-chip.active{background:rgba(0,212,170,.2);border-color:var(--teal);color:var(--teal);}
.filter-dot{width:7px;height:7px;border-radius:50%;}

/* ── PARTNER PANEL ── */
#partner-panel{
  position:fixed;right:0;top:0;bottom:0;width:340px;z-index:60;
  background:linear-gradient(135deg,rgba(7,21,31,.97),rgba(3,8,15,.98));
  border-left:1px solid rgba(0,212,170,.15);
  transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
#partner-panel.open{transform:translateX(0);}
.panel-glow{
  position:absolute;top:0;right:0;width:200px;height:200px;
  background:radial-gradient(circle,rgba(0,212,170,.12),transparent 70%);
  pointer-events:none;
}
.panel-close{
  position:absolute;top:1rem;right:1rem;
  background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);
  color:var(--teal);width:30px;height:30px;border-radius:50%;
  font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:2;
}
.panel-close:hover{background:rgba(0,212,170,.25);}
.panel-header{padding:2rem 1.5rem 1rem;border-bottom:1px solid rgba(0,212,170,.1);}
.partner-type-badge{
  display:inline-block;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  padding:.2rem .7rem;border-radius:2rem;margin-bottom:.8rem;
}
.partner-name{font-size:1.3rem;font-weight:700;font-family:'Rajdhani',system-ui;margin-bottom:.3rem;}
.partner-location{font-size:.8rem;color:var(--gray);display:flex;align-items:center;gap:.4rem;}
.panel-body{padding:1.2rem 1.5rem;flex:1;overflow-y:auto;}
.panel-body::-webkit-scrollbar{width:4px;}
.panel-body::-webkit-scrollbar-thumb{background:rgba(0,212,170,.2);border-radius:2px;}
.partner-logo-area{
  width:100%;height:110px;border-radius:.8rem;
  background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;margin-bottom:1.2rem;
}
.partner-desc{font-size:.82rem;color:rgba(176,210,230,.8);line-height:1.65;margin-bottom:1.2rem;}
.partner-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1.2rem;}
.partner-tag{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.18);color:var(--teal);font-size:.65rem;padding:.2rem .6rem;border-radius:.3rem;}
.partner-actions{display:flex;flex-direction:column;gap:.6rem;}
.btn-panel-primary{
  background:linear-gradient(135deg,var(--teal),var(--teal2));
  color:#fff;border:none;padding:.65rem 1.2rem;border-radius:.6rem;
  font-size:.82rem;font-weight:600;cursor:pointer;text-align:center;
  text-decoration:none;display:block;transition:opacity .2s;
}
.btn-panel-primary:hover{opacity:.85;}
.btn-panel-secondary{
  background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.25);
  color:var(--teal);padding:.6rem 1.2rem;border-radius:.6rem;
  font-size:.82rem;cursor:pointer;text-align:center;text-decoration:none;
  display:block;transition:all .2s;
}
.btn-panel-secondary:hover{background:rgba(0,212,170,.18);}

/* ── TOOLTIP (hover) ── */
#tooltip{
  position:fixed;z-index:80;pointer-events:none;
  background:rgba(7,21,31,.92);backdrop-filter:blur(12px);
  border:1px solid rgba(0,212,170,.3);border-radius:.6rem;
  padding:.55rem .9rem;font-size:.78rem;color:var(--white);
  white-space:nowrap;opacity:0;transition:opacity .2s;
  box-shadow:0 0 20px rgba(0,212,170,.15);
}
#tooltip.visible{opacity:1;}
#tooltip .tt-name{font-weight:700;color:var(--teal);}
#tooltip .tt-loc{color:var(--gray);font-size:.7rem;}

/* ── JOIN CTA ── */
#join-cta{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:55;
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
}
.join-btn{
  background:linear-gradient(135deg,rgba(0,212,170,.9),rgba(0,180,216,.9));
  border:1px solid rgba(0,255,200,.4);color:#fff;
  padding:.75rem 2rem;border-radius:2rem;font-size:.88rem;font-weight:700;
  cursor:pointer;letter-spacing:.07em;box-shadow:0 0 40px rgba(0,212,170,.35);
  animation:joinPulse 2.5s ease-in-out infinite;
  text-decoration:none;
}
.join-btn:hover{box-shadow:0 0 60px rgba(0,212,170,.6);transform:translateY(-2px);}
@keyframes joinPulse{0%,100%{box-shadow:0 0 30px rgba(0,212,170,.3);}50%{box-shadow:0 0 60px rgba(0,212,170,.6),0 0 100px rgba(0,212,170,.2);}}
.join-hint{font-size:.68rem;color:rgba(0,212,170,.6);letter-spacing:.12em;}

/* ── STATS RIBBON ── */
#stats-ribbon{
  position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);z-index:55;
  display:flex;gap:1.5rem;
  background:rgba(3,8,15,.75);backdrop-filter:blur(10px);
  border:1px solid rgba(0,212,170,.12);border-radius:2rem;
  padding:.4rem 1.5rem;
}
.ribbon-stat{text-align:center;}
.ribbon-num{font-size:1rem;font-weight:700;color:var(--teal);font-family:'Rajdhani',system-ui;}
.ribbon-label{font-size:.58rem;color:var(--gray);letter-spacing:.08em;}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1rem;
}
.loading-orb{
  width:60px;height:60px;border-radius:50%;
  border:2px solid rgba(0,212,170,.2);
  border-top:2px solid var(--teal);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:var(--teal);font-size:.85rem;letter-spacing:.2em;}

/* ── MOBILE ── */
@media(max-width:640px){
  #partner-panel{width:100%;}
  #search-box{width:150px;}
  #stats-ribbon{gap:.8rem;padding:.35rem 1rem;}
  .logo-sub{display:none;}
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════════════

// Couleurs par type de partenaire
const TYPE_COLORS = {
  therapeute: {hex:0x7b2fff, css:"#7b2fff", label:"Thérapeute"},
  medecin:    {hex:0xff6b35, css:"#ff6b35", label:"Médecin"},
  naturopathe:{hex:0x00d4aa, css:"#00d4aa", label:"Naturopathe"},
  magasin:    {hex:0xc9a84c, css:"#c9a84c", label:"Magasin Bio"},

// ═══════════════════════════════════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('globe');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x03080f, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 2.8);

const controls = new THREE.OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.4;
controls.maxDistance = 5;
controls.rotateSpeed = 0.4;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

// ── GROUP ROOT ──
const earthGroup = new THREE.Group();
scene.add(earthGroup);

// ═══════════════════════════════════════════════════════════════════════════
//  EARTH GLOBE — Shader cell membrane effect
// ═══════════════════════════════════════════════════════════════════════════
const globeGeo = new THREE.SphereGeometry(1, 64, 64);

// Custom GLSL shader — cellule biologique
const globeMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:      {value: 0},
    uResolution:{value: new THREE.Vector2(window.innerWidth, window.innerHeight)},
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main(){
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vWorldPos = (modelMatrix * vec4(position,1.)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorldPos;

    // Noise helpers
    float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    float noise(vec2 p){
      vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
      return mix(mix(hash(i),hash(i+vec2(1.,0.)),u.x),
                 mix(hash(i+vec2(0.,1.)),hash(i+vec2(1.,1.)),u.x),u.y);
    }
    float fbm(vec2 p){
      float v=0.,a=.5;
      for(int i=0;i<5;i++){v+=a*noise(p);p*=2.;a*=.5;}
      return v;
    }

    void main(){
      // Base continents from UV procedural
      float lon = vUv.x * 6.2832;
      float lat = (vUv.y - .5) * 3.1416;

      // Procedural continent blobs
      vec2 uv2 = vUv * vec2(4.,2.);
      float continent = fbm(uv2 + .5);
      continent = smoothstep(.42, .58, continent);

      // Ocean color (cytoplasm)
      vec3 oceanColor = vec3(0.01, 0.06, 0.12);
      // Land color (cell membrane patches)
      vec3 landColor = vec3(0.04, 0.18, 0.14);

      vec3 baseColor = mix(oceanColor, landColor, continent);

      // Membrane glow teal
      vec3 membraneColor = vec3(0., .83, .67);
      // Grid lines (latitude/longitude = cellular filaments)
      float gridLon = abs(sin(lon * 12.)) * .04;
      float gridLat = abs(sin(lat * 12.)) * .04;
      baseColor += membraneColor * (gridLon + gridLat) * .6;

      // Organelles — random glowing spots
      float organelles = fbm(uv2 * 3. + uTime * .05);
      organelles = smoothstep(.6, .7, organelles) * .25;
      baseColor += membraneColor * organelles;

      // Fresnel rim — membrane edge glow
      vec3 viewDir = normalize(cameraPosition - vWorldPos);
      float fresnel = pow(1. - max(dot(vNormal, viewDir), 0.), 3.5);
      baseColor += membraneColor * fresnel * 1.4;

      // Pulse breathing
      float pulse = sin(uTime * .8) * .5 + .5;
      baseColor += membraneColor * pulse * 0.04;

      // Specular highlight
      vec3 lightDir = normalize(vec3(1.,1.,1.));
      float spec = pow(max(dot(reflect(-lightDir,vNormal),viewDir),0.),.5) * .15;
      baseColor += vec3(spec);

      // Atmosphere glow near edges
      baseColor += vec3(0.,.3,.25) * fresnel * .5;

      gl_FragColor = vec4(baseColor, 1.);
    }
  `,
  side: THREE.FrontSide
});

const globe = new THREE.Mesh(globeGeo, globeMat);
earthGroup.add(globe);

// ── ATMOSPHERE ──
const atmMat = new THREE.ShaderMaterial({
  uniforms:{ uTime:{value:0} },
  vertexShader:`
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main(){
      vNormal=normalize(normalMatrix*normal);
      vWorldPos=(modelMatrix*vec4(position,1.)).xyz;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position*1.02,1.);
    }
  `,
  fragmentShader:`
    uniform float uTime;
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main(){
      vec3 viewDir=normalize(cameraPosition-vWorldPos);
      float fresnel=pow(1.-max(dot(vNormal,viewDir),0.),2.5);
      float pulse=sin(uTime*.6)*.5+.5;
      vec3 col=mix(vec3(0.,.6,.5),vec3(0.,.9,.7),pulse);
      gl_FragColor=vec4(col,fresnel*0.45);
    }
  `,
  transparent:true, side:THREE.FrontSide, depthWrite:false
});
const atm = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), atmMat);
earthGroup.add(atm);

// ── OUTER MEMBRANE ──
const membraneMat = new THREE.ShaderMaterial({
  uniforms:{ uTime:{value:0} },
  vertexShader:`
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main(){
      vNormal=normalize(normalMatrix*normal);
      vWorldPos=(modelMatrix*vec4(position,1.)).xyz;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position*1.055,1.);
    }
  `,
  fragmentShader:`
    uniform float uTime;
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main(){
      vec3 viewDir=normalize(cameraPosition-vWorldPos);
      float fresnel=pow(1.-max(dot(vNormal,viewDir),0.),4.);
      float pulse=sin(uTime*.5+length(vWorldPos)*3.)*.5+.5;
      gl_FragColor=vec4(0.,1.,.8,fresnel*0.18*pulse);
    }
  `,
  transparent:true, side:THREE.BackSide, depthWrite:false
});
earthGroup.add(new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), membraneMat));

// ═══════════════════════════════════════════════════════════════════════════
//  NUCLEUS — ORIM core pulse
// ═══════════════════════════════════════════════════════════════════════════
const nucleusGeo = new THREE.SphereGeometry(0.12, 32, 32);
const nucleusMat = new THREE.ShaderMaterial({
  uniforms:{ uTime:{value:0} },
  vertexShader:`
    varying vec3 vNormal;
    void main(){vNormal=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}
  `,
  fragmentShader:`
    uniform float uTime;
    varying vec3 vNormal;
    void main(){
      float p=sin(uTime*2.)*.5+.5;
      vec3 c=mix(vec3(.0,.8,.6),vec3(.5,.0,1.),p);
      gl_FragColor=vec4(c,1.);
    }
  `
});
const nucleus = new THREE.Mesh(nucleusGeo, nucleusMat);
earthGroup.add(nucleus);

// Nucleus glow ring
const ringGeo = new THREE.RingGeometry(0.14, 0.18, 48);
const ringMat = new THREE.MeshBasicMaterial({color:0x00ffcc, transparent:true, opacity:.25, side:THREE.DoubleSide});
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI/2;
earthGroup.add(ring);

// ═══════════════════════════════════════════════════════════════════════════
//  SPACE BACKGROUND — Stars + Nebulae
// ═══════════════════════════════════════════════════════════════════════════
// Stars
const starCount = 4000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
const starCol = new Float32Array(starCount * 3);
for(let i=0; i<starCount; i++){
  const r = 80 + Math.random()*200;
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  starPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  starPos[i*3+2] = r * Math.cos(phi);
  const warm = Math.random();
  starCol[i*3]   = warm > 0.7 ? 0.9 : 0.6 + Math.random()*.3;
  starCol[i*3+1] = warm > 0.7 ? 0.7 : 0.7 + Math.random()*.3;
  starCol[i*3+2] = warm > 0.7 ? 0.4 : 0.9 + Math.random()*.1;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
const starMat = new THREE.PointsMaterial({size:0.25, vertexColors:true, transparent:true, opacity:.8});
scene.add(new THREE.Points(starGeo, starMat));

// Nebula particles
const nebCount = 800;
const nebGeo = new THREE.BufferGeometry();
const nebPos = new Float32Array(nebCount * 3);
const nebCol = new Float32Array(nebCount * 3);
for(let i=0; i<nebCount; i++){
  const r = 30 + Math.random()*60;
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  nebPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  nebPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  nebPos[i*3+2] = r * Math.cos(phi);
  // Teal/purple nebula
  const t = Math.random();
  nebCol[i*3]   = t > .5 ? .4 : .2;
  nebCol[i*3+1] = t > .5 ? .8 : .1;
  nebCol[i*3+2] = t > .5 ? .7 : .9;
}
nebGeo.setAttribute('position', new THREE.BufferAttribute(nebPos, 3));
nebGeo.setAttribute('color', new THREE.BufferAttribute(nebCol, 3));
scene.add(new THREE.Points(nebGeo, new THREE.PointsMaterial({size:1.2, vertexColors:true, transparent:true, opacity:.12})));

// ═══════════════════════════════════════════════════════════════════════════
//  CYTOPLASM FILAMENTS — connecting partner points to nucleus
// ═══════════════════════════════════════════════════════════════════════════
const filamentGroup = new THREE.Group();
earthGroup.add(filamentGroup);

// ═══════════════════════════════════════════════════════════════════════════
//  PARTNER POINTS on the Globe
// ═══════════════════════════════════════════════════════════════════════════
function latLonToVec3(lat, lon, r=1.02) {
  const phi   = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

const partnerMeshes = [];

function buildPartnerPoints(list) {
  // Clear old
  partnerMeshes.forEach(m => earthGroup.remove(m.mesh));
  partnerMeshes.length = 0;
  filamentGroup.clear();

  list.forEach(p => {
    const color = TYPE_COLORS[p.type] || {hex:0x00d4aa};
    const pos = latLonToVec3(p.lat, p.lon);

    // Outer ring
    const ringG = new THREE.RingGeometry(0.028, 0.038, 24);
    const ringM = new THREE.MeshBasicMaterial({color:color.hex, transparent:true, opacity:.5, side:THREE.DoubleSide});
    const ringMesh = new THREE.Mesh(ringG, ringM);
    ringMesh.position.copy(pos);
    ringMesh.lookAt(pos.clone().multiplyScalar(2));
    earthGroup.add(ringMesh);

    // Core dot
    const dotG = new THREE.SphereGeometry(0.016, 12, 12);
    const dotM = new THREE.MeshBasicMaterial({color:color.hex});
    const dot = new THREE.Mesh(dotG, dotM);
    dot.position.copy(pos);
    earthGroup.add(dot);

    // Glow sphere
    const glowG = new THREE.SphereGeometry(0.03, 12, 12);
    const glowM = new THREE.MeshBasicMaterial({color:color.hex, transparent:true, opacity:.18});
    const glow = new THREE.Mesh(glowG, glowM);
    glow.position.copy(pos);
    earthGroup.add(glow);

    // Filament to nucleus
    const pts = [];
    const mid = pos.clone().multiplyScalar(0.4);
    for(let t=0; t<=1; t+=0.05) {
      pts.push(new THREE.Vector3().lerpVectors(pos, new THREE.Vector3(0,0,0), t).add(
        mid.clone().multiplyScalar(Math.sin(t*Math.PI)*.2)
      ));
    }
    const filGeo = new THREE.BufferGeometry().setFromPoints(pts);
    const filMat = new THREE.LineBasicMaterial({color:color.hex, transparent:true, opacity:.12});
    filamentGroup.add(new THREE.Line(filGeo, filMat));

    partnerMeshes.push({mesh:dot, ring:ringMesh, glow, data:p, pos:pos.clone()});
  });

  document.getElementById('stat-visible').textContent = list.length;
}

buildPartnerPoints(PARTNERS);
document.getElementById('stat-total').textContent = PARTNERS.length;
document.getElementById('stat-countries').textContent = new Set(PARTNERS.map(p=>p.country)).size;

// ═══════════════════════════════════════════════════════════════════════════
//  FLOATING CYTOPLASM PARTICLES
// ═══════════════════════════════════════════════════════════════════════════
const cytoCount = 200;
const cytoGeo = new THREE.BufferGeometry();
const cytoPos = new Float32Array(cytoCount * 3);
for(let i=0; i<cytoCount; i++){
  const r = 0.3 + Math.random()*.65;
  const phi = Math.acos(2*Math.random()-1);
  const theta = Math.random()*Math.PI*2;
  cytoPos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
  cytoPos[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
  cytoPos[i*3+2] = r*Math.cos(phi);
}
cytoGeo.setAttribute('position', new THREE.BufferAttribute(cytoPos, 3));
const cytoMat = new THREE.PointsMaterial({color:0x00ffcc, size:0.01, transparent:true, opacity:.35});
earthGroup.add(new THREE.Points(cytoGeo, cytoMat));

// ═══════════════════════════════════════════════════════════════════════════
//  RAYCASTING — hover + click
// ═══════════════════════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
const ttName = document.getElementById('tt-name');
const ttLoc  = document.getElementById('tt-loc');
let hoveredIdx = -1;
let activeFilter = 'all';
let searchQuery = '';

function getFilteredPartners() {
  return PARTNERS.filter(p => {
    const matchFilter = activeFilter === 'all' || p.type === activeFilter;
    const matchSearch = searchQuery === '' ||
      p.name.toLowerCase().includes(searchQuery) ||
      p.city.toLowerCase().includes(searchQuery) ||
      p.country.toLowerCase().includes(searchQuery);
    return matchFilter && matchSearch;
  });
}

canvas.addEventListener('mousemove', e => {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(partnerMeshes.map(p=>p.mesh));

  if(hits.length) {
    const idx = partnerMeshes.findIndex(p=>p.mesh===hits[0].object);
    if(idx !== hoveredIdx) {
      hoveredIdx = idx;
      const d = partnerMeshes[idx].data;
      ttName.textContent = d.name;
      ttLoc.textContent  = `${d.emoji} ${d.city}, ${d.country}`;
      controls.autoRotate = false;
    }
    tooltip.style.left = (e.clientX+14)+'px';
    tooltip.style.top  = (e.clientY-8)+'px';
    tooltip.classList.add('visible');
    canvas.style.cursor = 'pointer';
  } else {
    hoveredIdx = -1;
    tooltip.classList.remove('visible');
    canvas.style.cursor = 'grab';
    if(!document.getElementById('partner-panel').classList.contains('open')) {
      controls.autoRotate = true;
    }
  }
});

canvas.addEventListener('click', e => {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(partnerMeshes.map(p=>p.mesh));
  if(hits.length) {
    const pm = partnerMeshes.find(p=>p.mesh===hits[0].object);
    if(pm) openPanel(pm.data);
  }
});

// ═══════════════════════════════════════════════════════════════════════════
//  PARTNER PANEL
// ═══════════════════════════════════════════════════════════════════════════
function openPanel(d) {
  const tc = TYPE_COLORS[d.type] || {css:'#00d4aa', label:'Partenaire'};
  document.getElementById('pp-badge').textContent = tc.label;
  document.getElementById('pp-badge').style.background = tc.css+'22';
  document.getElementById('pp-badge').style.border = '1px solid '+tc.css+'66';
  document.getElementById('pp-badge').style.color = tc.css;
  document.getElementById('pp-name').textContent = d.name;
  document.getElementById('pp-location').innerHTML = `📍 ${d.city}, ${d.country}`;
  document.getElementById('pp-logo').innerHTML = `<span style="font-size:3rem;">${d.emoji}</span>`;
  document.getElementById('pp-desc').textContent = d.desc;
  const tagsEl = document.getElementById('pp-tags');
  tagsEl.innerHTML = d.tags.map(t=>`<span class="partner-tag">${t}</span>`).join('');
  document.getElementById('pp-rdv').href = d.rdv;
  document.getElementById('pp-site').href = d.site;
  document.getElementById('partner-panel').classList.add('open');
  controls.autoRotate = false;
  // Zoom toward partner
  const pm = partnerMeshes.find(p=>p.data.id===d.id);
  if(pm) {
    const target = pm.pos.clone().multiplyScalar(2.2);
    gsap.to(camera.position, {x:target.x, y:target.y, z:target.z, duration:1.2, ease:'power2.inOut'});
  }
}

document.getElementById('panel-close').addEventListener('click', () => {
  document.getElementById('partner-panel').classList.remove('open');
  controls.autoRotate = true;
});

// ═══════════════════════════════════════════════════════════════════════════
//  FILTERS
// ═══════════════════════════════════════════════════════════════════════════
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    buildPartnerPoints(getFilteredPartners());
  });
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  buildPartnerPoints(getFilteredPartners());
});

// ═══════════════════════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════════════════════
document.getElementById('btn-reset').addEventListener('click', () => {
  gsap.to(camera.position, {x:0, y:0, z:2.8, duration:1.2, ease:'power2.inOut'});
  gsap.to(controls.target, {x:0, y:0, z:0, duration:1.2, ease:'power2.inOut'});
  document.getElementById('partner-panel').classList.remove('open');
  controls.autoRotate = true;
});

document.getElementById('btn-fullscreen').addEventListener('click', () => {
  if(!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
    document.getElementById('btn-fullscreen').textContent = '⤡ Exit';
  } else {
    document.exitFullscreen();
    document.getElementById('btn-fullscreen').textContent = '⤢ Fullscreen';
  }
});

// ═══════════════════════════════════════════════════════════════════════════
//  AMBIENT LIGHT
// ═══════════════════════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffffff, 0.3));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 3, 5);
scene.add(dirLight);

// ═══════════════════════════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════════════════════════════════
//  ANIMATE LOOP
// ═══════════════════════════════════════════════════════════════════════════
let t = 0;
const RING_SCALES = {};

function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  // Update shader uniforms
  globeMat.uniforms.uTime.value = t;
  atmMat.uniforms.uTime.value   = t;
  membraneMat.uniforms.uTime.value = t;
  nucleusMat.uniforms.uTime.value  = t;

  // Pulse nucleus ring
  const pr = 1 + Math.sin(t*2)*.08;
  ring.scale.setScalar(pr);

  // Pulse partner rings + glow
  partnerMeshes.forEach((pm, i) => {
    const pulse = 1 + Math.sin(t*1.5 + i*.7)*.12;
    pm.ring.scale.setScalar(pulse);
    pm.glow.material.opacity = 0.1 + Math.sin(t*1.5 + i*.7)*.08;
  });

  // Slowly rotate nebula
  scene.children.forEach(c => {
    if(c.isPoints && c !== scene.children[0]) c.rotation.y += 0.00015;
  });

  controls.update();
  renderer.render(scene, camera);
}

// Hide loading after short delay
setTimeout(() => {
  document.getElementById('loading').style.opacity = '0';
  setTimeout(() => document.getElementById('loading').style.display='none', 600);
  animate();
  // Intro animation
  gsap.from(camera.position, {z:8, duration:3, ease:'power3.out'});
  gsap.from(earthGroup.rotation, {y: -Math.PI, duration:3, ease:'power3.out'});
}, 800);

// Touch support for mobile
canvas.addEventListener('touchstart', () => { controls.autoRotate = false; });
canvas.addEventListener('touchend', () => {
  if(!document.getElementById('partner-panel').classList.contains('open'))
    setTimeout(() => controls.autoRotate = true, 3000);
});
</script>
