<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIM Nutrition — Carte des Partenaires</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
body{
  font-family:'Inter',system-ui,sans-serif;
  background:#020810;
  color:#e0f0ec;
  overflow:hidden;
  width:100vw;height:100vh;
  cursor:default;
}
#bg-video-wrap{position:fixed;inset:0;z-index:0;overflow:hidden}
#bg-video{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  min-width:100%;min-height:100%;width:auto;height:auto;
  object-fit:cover;opacity:.12;pointer-events:none;
  filter:hue-rotate(140deg) saturate(.6) brightness(.5);
}
#canvas-container{position:fixed;inset:0;z-index:1}
canvas{display:block;width:100%;height:100%}

/* TOP NAV */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:.6rem 1.2rem;
  background:rgba(1,5,9,.88);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,212,170,.1);
  pointer-events:none;
}
.top-bar>*{pointer-events:auto}
.logo{
  font-size:1.1rem;font-weight:700;letter-spacing:2px;
  color:#00d4aa;text-shadow:0 0 12px rgba(0,212,170,.3);
  flex-shrink:0;
}
.logo span{color:#e0f0ec;font-weight:300;opacity:.7;font-size:.65rem;margin-left:5px;letter-spacing:1px}
.nav-links{display:flex;align-items:center;gap:.8rem;flex-wrap:nowrap}
.nav-links a{
  color:#8ab8b0;text-decoration:none;font-size:.65rem;letter-spacing:.8px;
  text-transform:uppercase;transition:color .3s;font-weight:500;white-space:nowrap;
}
.nav-links a:hover{color:#00d4aa}
.btn-contact{
  background:linear-gradient(135deg,#007a5e,#005c46);
  color:#e0f0ec;border:none;border-radius:22px;
  padding:0.4rem 1rem;font-size:.65rem;font-weight:700;
  cursor:pointer;letter-spacing:.6px;
  text-transform:uppercase;white-space:nowrap;
  transition:transform .2s,box-shadow .2s;
  text-decoration:none;
  display:inline-block;
  box-shadow:0 0 18px rgba(0,212,170,.35),0 0 40px rgba(0,122,94,.25);
  animation:ctaPulse 2.5s ease-in-out infinite;
}
@keyframes ctaPulse{
  0%,100%{box-shadow:0 0 18px rgba(0,212,170,.35),0 0 40px rgba(0,122,94,.25)}
  50%{box-shadow:0 0 24px rgba(0,212,170,.55),0 0 60px rgba(0,122,94,.4)}
}
.btn-contact:hover{
  transform:scale(1.08);
  box-shadow:0 0 30px rgba(0,212,170,.6),0 0 60px rgba(0,122,94,.4);
  background:linear-gradient(135deg,#009070,#007a5e);
}
.nav-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.lang-sel{display:flex;gap:2px}
.lang-sel button{
  background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);
  color:#8ab8b0;font-size:.62rem;padding:3px 8px;border-radius:4px;
  cursor:pointer;font-weight:600;letter-spacing:.5px;
  transition:all .3s;
}
.lang-sel button:hover,.lang-sel button.active{
  background:rgba(0,212,170,.25);color:#00d4aa;
  border-color:rgba(0,212,170,.5);
}

/* TOOLTIP */
#tooltip{
  position:fixed;z-index:200;
  pointer-events:none;
  background:rgba(3,8,16,.92);
  border:1px solid rgba(0,212,170,.3);
  border-radius:8px;
  padding:8px 14px;
  font-size:.78rem;
  color:#e0f0ec;
  backdrop-filter:blur(8px);
  white-space:nowrap;
  opacity:0;transition:opacity .2s;
  box-shadow:0 4px 20px rgba(0,0,0,.6);
}
#tooltip.visible{opacity:1}

/* SIDE PANEL */
#side-panel{
  position:fixed;top:0;z-index:150;
  width:340px;max-width:85vw;height:100vh;
  background:rgba(3,8,16,.95);
  backdrop-filter:blur(16px);
  padding:2rem 1.5rem;
  overflow-y:auto;
  transition:transform .4s cubic-bezier(.4,0,.2,1);
  border:none;
}
#side-panel.open-right{
  right:0;left:auto;
  transform:translateX(0);
  border-left:1px solid rgba(0,212,170,.15);
}
#side-panel.open-left{
  left:0;right:auto;
  transform:translateX(0);
  border-right:1px solid rgba(0,212,170,.15);
}
#side-panel.closed-right{
  right:0;left:auto;
  transform:translateX(100%);
}
#side-panel.closed-left{
  left:0;right:auto;
  transform:translateX(-100%);
}
#side-panel.init{
  right:0;left:auto;
  transform:translateX(100%);
}
.panel-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.3rem}
.panel-country{font-size:1.5rem;font-weight:700;color:#00d4aa}
.panel-flag{font-size:2rem}
.panel-subtitle{font-size:.72rem;color:#6a9a90;margin-bottom:1.5rem;text-transform:uppercase;letter-spacing:1px}
.panel-partner{
  background:rgba(0,212,170,.04);
  border:1px solid rgba(0,212,170,.1);
  border-radius:10px;
  padding:1rem;margin-bottom:.8rem;
  transition:border-color .3s;
}
.panel-partner:hover{border-color:rgba(0,212,170,.35)}
.panel-partner-name{font-weight:600;font-size:.88rem;color:#e0f0ec;margin-bottom:.3rem}
.panel-partner-type{
  display:inline-block;
  font-size:.58rem;text-transform:uppercase;letter-spacing:1px;
  background:rgba(0,212,170,.15);color:#00d4aa;
  padding:2px 8px;border-radius:4px;margin-bottom:.5rem;font-weight:600;
}
.panel-partner-desc{font-size:.73rem;color:#8ab8b0;line-height:1.5;margin-bottom:.5rem}
.panel-partner-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:.5rem}
.panel-partner-tags span{
  font-size:.56rem;background:rgba(0,212,170,.08);
  border:1px solid rgba(0,212,170,.12);
  color:#6a9a90;padding:2px 6px;border-radius:3px;
}
.panel-partner-links{display:flex;gap:.5rem}
.panel-partner-links a{
  font-size:.63rem;color:#00d4aa;text-decoration:none;
  border:1px solid rgba(0,212,170,.2);padding:3px 10px;
  border-radius:4px;transition:all .3s;
}
.panel-partner-links a:hover{background:rgba(0,212,170,.15)}
.panel-close{
  position:absolute;top:1rem;right:1rem;
  background:none;border:1px solid rgba(0,212,170,.2);
  color:#6a9a90;width:28px;height:28px;border-radius:50%;
  cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;
  transition:all .3s;
}
.panel-close:hover{color:#00d4aa;border-color:rgba(0,212,170,.5)}

/* BOTTOM CTA */
.bottom-cta{
  position:fixed;bottom:3.8rem;left:50%;transform:translateX(-50%);
  z-index:100;text-align:center;pointer-events:none;
  white-space:nowrap;
}
.bottom-cta>*{pointer-events:auto}
.cta-text{
  font-size:.88rem;font-weight:700;color:#e0f0ec;
  margin-bottom:.6rem;letter-spacing:.8px;
  text-shadow:0 2px 16px rgba(0,0,0,.95),0 0 40px rgba(0,0,0,.8);
}
.cta-btn{
  display:inline-block;
  background:linear-gradient(135deg,rgba(0,212,170,.25),rgba(0,168,134,.15));
  border:1px solid rgba(0,212,170,.4);
  color:#00d4aa;padding:.7rem 2.2rem;
  border-radius:25px;font-size:.82rem;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;
  cursor:pointer;text-decoration:none;
  transition:all .3s;
  box-shadow:0 0 30px rgba(0,212,170,.15);
}
.cta-btn:hover{
  background:linear-gradient(135deg,rgba(0,212,170,.35),rgba(0,212,170,.15));
  box-shadow:0 0 25px rgba(0,212,170,.2);
  transform:scale(1.04);
}

/* CONTACT FOOTER */
.contact-footer{
  position:fixed;bottom:0;left:0;right:0;z-index:90;
  display:flex;justify-content:center;gap:2rem;
  padding:.6rem 1rem;
  background:rgba(1,5,9,.92);
  border-top:1px solid rgba(0,212,170,.08);
  pointer-events:none;
}
.contact-footer span{
  pointer-events:auto;
  font-size:.65rem;color:#5a8a80;letter-spacing:.5px;
}
.contact-footer a{color:#00d4aa;text-decoration:none;opacity:.7;transition:opacity .3s}
.contact-footer a:hover{opacity:1}

/* LOADING */
#loader{
  position:fixed;inset:0;z-index:9999;
  background:#020810;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity .8s;
}
#loader.done{opacity:0;pointer-events:none}
#loader .spinner{
  width:40px;height:40px;
  border:2px solid rgba(0,212,170,.15);
  border-top-color:#00d4aa;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{margin-top:1rem;font-size:.72rem;color:#4a7a70;letter-spacing:2px;text-transform:uppercase}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,212,170,.2);border-radius:2px}

@media(max-width:700px){
  .top-bar{padding:.5rem .8rem}
  .nav-links{gap:.6rem}
  .nav-links a:not(.btn-contact){font-size:.55rem}
  .btn-contact{padding:.4rem .9rem;font-size:.65rem}
  .lang-sel button{font-size:.52rem;padding:2px 5px}
  #side-panel{width:88vw;padding:1.2rem 1rem}
  .bottom-cta{bottom:3rem}
  .cta-text{font-size:.72rem}
  .cta-btn{font-size:.7rem;padding:.55rem 1.5rem}
  .contact-footer{gap:.5rem;flex-wrap:wrap;justify-content:center;padding:.5rem .6rem}
  .contact-footer span{font-size:.5rem}
}
</style>
</head>

var GLOBE_R = 1.0;
var globeMesh = new THREE.Mesh(
  new THREE.SphereGeometry(GLOBE_R, 64, 64),
  new THREE.ShaderMaterial({
    vertexShader: [
      'varying vec3 vNormal;',
      'varying vec3 vPos;',
      'void main(){',
      '  vNormal = normalize(normalMatrix * normal);',
      '  vPos = position;',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'varying vec3 vNormal;',
      'varying vec3 vPos;',
      'void main(){',
      '  vec3 deepBlue = vec3(0.015, 0.055, 0.13);',
      '  vec3 midBlue = vec3(0.03, 0.09, 0.19);',
      '  vec3 lightBlue = vec3(0.05, 0.14, 0.25);',
      '  float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.2);',
      '  float wave = sin(vPos.x * 12.0 + vPos.y * 8.0 + vPos.z * 6.0) * 0.5 + 0.5;',
      '  float wave2 = sin(vPos.x * 5.0 - vPos.z * 7.0) * 0.5 + 0.5;',
      '  vec3 col = mix(deepBlue, midBlue, wave * 0.3 + wave2 * 0.15);',
      '  col = mix(col, lightBlue, fresnel * 0.5);',
      '  col += vec3(0.0, 0.025, 0.02) * fresnel;',
      '  gl_FragColor = vec4(col, 0.97);',
      '}'
    ].join('\n'),
    transparent: true
  })
);

/* ─── lat/lon → 3D ─── */
function latLonToVec3(lat, lon, r) {
  var phi = (90 - lat) * Math.PI / 180;
  var theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

/* ───────────────────────────────── LOAD GeoJSON & DRAW COUNTRIES ───────────────────────────────── */
var countryLinesGroup = new THREE.Group();
scene.add(countryLinesGroup);

var countryHitMeshes = [];
var countryDataMap = {};
var geoLoaded = false;

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(function(r){ return r.json(); })
  .then(function(topo){
    var countries = topojson.feature(topo, topo.objects.countries);

    countries.features.forEach(function(feat){
      var isoNum = feat.id;
      var name = (feat.properties && feat.properties.name) ? feat.properties.name : '';
      var alpha3 = numToAlpha3(isoNum);

      var lineObjs = [];
      var geom = feat.geometry;
      var polys = [];
      if (geom.type === 'Polygon') polys = [geom.coordinates];
      else if (geom.type === 'MultiPolygon') polys = geom.coordinates;

      polys.forEach(function(poly){
        poly.forEach(function(ring){
          if (ring.length < 2) return;
          var pts = [];
          for (var i = 0; i < ring.length; i++) {
            pts.push(latLonToVec3(ring[i][1], ring[i][0], GLOBE_R * 1.005));
          }
          var bGeo = new THREE.BufferGeometry().setFromPoints(pts);
          var line = new THREE.Line(bGeo, new THREE.LineBasicMaterial({
            color: 0x00d4aa, transparent: true, opacity: 0.4, depthWrite: false,
            blending: THREE.AdditiveBlending
          }));
          countryLinesGroup.add(line);
          lineObjs.push(line);
        });

        // Hit-test mesh from first ring using fan triangulation
        try {
          var hitRing = poly[0];
          if (hitRing.length >= 4) {
            var vecs = [];
            var cx = 0, cy = 0, cz = 0;
            for (var i = 0; i < hitRing.length; i++) {
              var v = latLonToVec3(hitRing[i][1], hitRing[i][0], GLOBE_R * 1.008);
              vecs.push(v);
              cx += v.x; cy += v.y; cz += v.z;
            }
            var cn = vecs.length;
            cx /= cn; cy /= cn; cz /= cn;
            // Normalize center onto sphere
            var cl = Math.sqrt(cx*cx + cy*cy + cz*cz);
            if (cl > 0.001) {
              cx = cx/cl * GLOBE_R * 1.008;
              cy = cy/cl * GLOBE_R * 1.008;
              cz = cz/cl * GLOBE_R * 1.008;
            }

            var vertices = [];
            for (var i = 0; i < cn; i++) {
              vertices.push(vecs[i].x, vecs[i].y, vecs[i].z);
            }
            vertices.push(cx, cy, cz);
            var centerIdx = cn;
            var indices = [];
            for (var i = 0; i < cn; i++) {
              var next = (i + 1) % cn;
              indices.push(centerIdx, i, next);
            }
            var hGeo = new THREE.BufferGeometry();
            hGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            hGeo.setIndex(indices);
            hGeo.computeBoundingSphere();
            var hMesh = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide }));
            hMesh.userData = { countryCode: alpha3, countryName: name, isoNum: isoNum };
            scene.add(hMesh);
            countryHitMeshes.push(hMesh);
          }
        } catch(e){}
      });

      if (alpha3) {
        if (!countryDataMap[alpha3]) {
          countryDataMap[alpha3] = { name: name, lines: lineObjs, reliéfMeshes: [], elevated: false, rings: [] };
        } else {
          countryDataMap[alpha3].lines = countryDataMap[alpha3].lines.concat(lineObjs);
        }
      }

      // Build reliéf meshes (filled country polygons for élévation)
      if (alpha3 && countryDataMap[alpha3]) {
        polys.forEach(function(poly){
          try {
            var outerRing = poly[0];
            if (outerRing.length < 4) return;
            var flat = [];
            outerRing.forEach(function(c){ flat.push(c[0], c[1]); });
            var holeIndices = [];
            for (var hi = 1; hi < poly.length; hi++) {
              holeIndices.push(flat.length / 2);
              poly[hi].forEach(function(c){ flat.push(c[0], c[1]); });
            }
            var tris = earcut(flat, holeIndices.length ? holeIndices : null);
            if (!tris.length) return;
            var positions = new Float32Array((flat.length / 2) * 3);
            for (var i = 0; i < flat.length; i += 2) {
              var pos = latLonToVec3(flat[i+1], flat[i], GLOBE_R * 1.004);
              var idx3 = (i / 2) * 3;
              positions[idx3] = pos.x; positions[idx3+1] = pos.y; positions[idx3+2] = pos.z;
            }
            var rGeo = new THREE.BufferGeometry();
            rGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            rGeo.setIndex(tris);
            rGeo.computeVertexNormals();
            rGeo.userData = { flatCoords: flat };
            var rMat = new THREE.MeshBasicMaterial({
              color: 0x00d4aa, transparent: true, opacity: 0.04, side: THREE.DoubleSide,
              depthWrite: false, blending: THREE.AdditiveBlending
            });
            var rMesh = new THREE.Mesh(rGeo, rMat);
            scene.add(rMesh);
            countryDataMap[alpha3].reliéfMeshes.push(rMesh);
          } catch(e){}
        });
      }
    });

    geoLoaded = true;
    document.getElementById('loader').classList.add('done');
  })
  .catch(function(err){
    console.error('Map load failed:', err);
    document.getElementById('loader').classList.add('done');
  });

/* ───────────────────────────────── RAYCASTING & INTERACTION ───────────────────────────────── */
var raycaster = new THREE.Raycaster();
var mouse = new THREE.Vector2(-9, -9);
var tooltipEl = document.getElementById('tooltip');
var sidePanelEl = document.getElementById('side-panel');

var hoveredCountryCode = null;
var panelOpen = false;
var panelTimeout = null;
var panelMinTimer = null;
var canClosePanel = false;
var mouseInPanel = false;

function partnersInCountry(code) {
  return PARTNERS.filter(function(p){ return p.countryCode === code; });
}

/* ─── COUNTRY RELIEF ─── */
var elevatedCountryCode = null;

function setCountryRadius(code, radius) {
  var d = countryDataMap[code];
  if (!d || !d.reliéfMeshes) return;
  d.reliéfMeshes.forEach(function(mesh){
    var flat = mesh.geometry.userData.flatCoords;
    var positions = mesh.geometry.attributes.position.array;
    for (var i = 0; i < flat.length; i += 2) {
      var pos = latLonToVec3(flat[i+1], flat[i], radius);
      var idx3 = (i / 2) * 3;
      positions[idx3] = pos.x; positions[idx3+1] = pos.y; positions[idx3+2] = pos.z;
    }
    mesh.geometry.attributes.position.needsUpdate = true;
  });
}

function elevateCountry(code, up) {
  var d = countryDataMap[code];
  if (!d) return;
  var obj = { radius: up ? GLOBE_R * 1.004 : GLOBE_R * 1.035 };
  var target = up ? GLOBE_R * 1.035 : GLOBE_R * 1.004;
  var targetOpacity = up ? 0.15 : 0;
  gsap.to(obj, { radius: target, duration: 0.5, ease: 'power2.out',
    onUpdate: function(){ setCountryRadius(code, obj.radius); }
  });
  d.reliéfMeshes.forEach(function(mesh){
    gsap.to(mesh.material, { opacity: targetOpacity, duration: 0.4 });
  });
  // Also brighten country lines when elevated
  if (up) {
    d.lines.forEach(function(l){ l.material.opacity = 0.9; l.material.color.setHex(0x00ffee); });
  } else {
    d.lines.forEach(function(l){ l.material.opacity = 0.4; l.material.color.setHex(0x00d4aa); });
  }
  d.elevated = up;
}

function selectCountry(code) {
  if (elevatedCountryCode && elevatedCountryCode !== code) {
    elevateCountry(elevatedCountryCode, false);
  }
  if (elevatedCountryCode === code) {
    elevateCountry(code, false);
    elevatedCountryCode = null;
    return;
  }
  elevatedCountryCode = code;
  elevateCountry(code, true);
}

function highlightCountry(code) {
  var d = countryDataMap[code];
  if (d && d.lines) {
    d.lines.forEach(function(l){
      l.material.opacity = 0.85;
      l.material.color.setHex(0x00ffcc);
    });
  }
}

function unhighlightCountry(code) {
  var d = countryDataMap[code];
  if (d && d.lines) {
    d.lines.forEach(function(l){
      l.material.opacity = 0.4;
      l.material.color.setHex(0x00d4aa);
    });
  }
}

function onMouseMove(e) {
  var cx = e.clientX, cy = e.clientY;
  mouse.x = (cx / window.innerWidth) * 2 - 1;
  mouse.y = -(cy / window.innerHeight) * 2 + 1;

  if (!geoLoaded) return;

  raycaster.setFromCamera(mouse, camera);
  var hits = raycaster.intersectObjects(countryHitMeshes, false);

  if (hits.length > 0) {
    var ud = hits[0].object.userData;
    var code = ud.countryCode;
    var name = ud.countryName;

    if (hoveredCountryCode !== code) {
      if (hoveredCountryCode) unhighlightCountry(hoveredCountryCode);
      hoveredCountryCode = code;
      highlightCountry(code);
    }

    var allEntries = partnersInCountry(code);
    var partnerCount = allEntries.filter(function(p){ return p.type !== 'non-partenaire'; }).length;
    var nonPartnerCount = allEntries.filter(function(p){ return p.type === 'non-partenaire'; }).length;
    var flag = FLAG_MAP[code] || '';
    var text = (flag ? flag + ' ' : '') + name;
    if (partnerCount > 0) text += ' \u2014 ' + partnerCount + ' ' + (partnerCount > 1 ? t('tooltip.partners.plural') : t('tooltip.partners'));
    if (nonPartnerCount > 0) text += (partnerCount > 0 ? ' + ' : ' \u2014 ') + nonPartnerCount + ' ' + t('tooltip.nonpartners');
    tooltipEl.textContent = text;
    tooltipEl.classList.add('visible');
    tooltipEl.style.left = (cx + 16) + 'px';
    tooltipEl.style.top = (cy - 12) + 'px';
    renderer.domElement.style.cursor = 'pointer';
  } else {
    if (hoveredCountryCode) {
      unhighlightCountry(hoveredCountryCode);
      hoveredCountryCode = null;
    }
    tooltipEl.classList.remove('visible');
    renderer.domElement.style.cursor = 'default';
  }
}

function onClickGlobe(e) {
  if (!geoLoaded) return;
  var cx = e.clientX, cy = e.clientY;
  mouse.x = (cx / window.innerWidth) * 2 - 1;
  mouse.y = -(cy / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  var hits = raycaster.intersectObjects(countryHitMeshes, false);
  if (hits.length > 0) {
    var ud = hits[0].object.userData;
    var code = ud.countryCode;
    // Always trigger reliéf
    selectCountry(code);
    // Open panel with partners + non-partners
    var entries = partnersInCountry(code);
    if (entries.length > 0) {
      openSidePanel(code, ud.countryName, entries, cx);
    }
  }
}

/* ─── SIDE PANEL ─── */
function openSidePanel(code, name, partners, clickX) {
  panelOpen = true;
  mouseInPanel = false;
  canClosePanel = false;
  clearTimeout(panelTimeout);
  clearTimeout(panelMinTimer);

  var side = clickX < window.innerWidth / 2 ? 'right' : 'left';
  sidePanelEl.className = 'open-' + side;

  var flag = FLAG_MAP[code] || '';
  var h = '';
  h += '<button class="panel-close" onclick="window.__closePanel()">\u00d7</button>';
  h += '<div class="panel-header"><span class="panel-flag">' + flag + '</span><span class="panel-country">' + escHtml(name) + '</span></div>';
  h += '<div class="panel-subtitle">' + partners.length + ' ' + (partners.length > 1 ? t('panel.partners') : t('panel.partner')) + '</div>';

  // Separate partners and non-partners
  var realPartners = partners.filter(function(p){ return p.type !== 'non-partenaire'; });
  var nonPartners = partners.filter(function(p){ return p.type === 'non-partenaire'; });

  if (realPartners.length > 0) {
    h += '<div style="font-size:.62rem;color:#00d4aa;letter-spacing:1px;text-transform:uppercase;margin-bottom:.6rem;font-weight:600">' + t('panel.section.partners') + '</div>';
    realPartners.forEach(function(p){
      h += '<div class="panel-partner">';
      h += '<div class="panel-partner-name">' + p.emoji + ' ' + escHtml(p.name) + '</div>';
      h += '<div class="panel-partner-type">' + escHtml(t('type.' + p.type) || TYPE_LABELS[p.type] || p.type) + '</div>';
      h += '<div class="panel-partner-desc">' + escHtml(p.desc) + '</div>';
      h += '<div class="panel-partner-tags">';
      p.tags.forEach(function(tg){ h += '<span>' + escHtml(tg) + '</span>'; });
      h += '</div>';
      h += '<div class="panel-partner-links">';
      h += '<a href="' + p.rdv + '" target="_blank" rel="noopener">' + t('panel.rdv') + '</a>';
      h += '<a href="' + p.site + '" target="_blank" rel="noopener">' + t('panel.site') + '</a>';
      h += '</div></div>';
    });
  }

  if (nonPartners.length > 0) {
    h += '<div style="font-size:.62rem;color:#6a7a8a;letter-spacing:1px;text-transform:uppercase;margin:1.2rem 0 .6rem;font-weight:600;border-top:1px solid rgba(106,122,138,.2);padding-top:.8rem">' + t('panel.section.nonpartners') + '</div>';
    nonPartners.forEach(function(p){
      h += '<div class="panel-partner" style="border-color:rgba(106,122,138,.15);background:rgba(106,122,138,.04)">';
      h += '<div class="panel-partner-name">' + p.emoji + ' ' + escHtml(p.name) + '</div>';
      h += '<div class="panel-partner-type" style="background:rgba(106,122,138,.15);color:#8a9aaa">' + escHtml(t('type.non-partenaire')) + '</div>';
      h += '<div class="panel-partner-desc">' + escHtml(p.desc) + '</div>';
      if (p.source) h += '<div style="font-size:.56rem;color:#5a6a7a;font-style:italic;margin-bottom:.4rem">' + t('panel.source') + ' ' + escHtml(p.source) + '</div>';
      h += '<div class="panel-partner-tags">';
      p.tags.forEach(function(tg){ h += '<span style="border-color:rgba(106,122,138,.15);color:#6a8a80">' + escHtml(tg) + '</span>'; });
      h += '</div>';
      h += '<div class="panel-partner-links">';
      h += '<a href="' + p.site + '" target="_blank" rel="noopener" style="border-color:rgba(106,122,138,.2);color:#6a7a8a">' + t('panel.site') + '</a>';
      h += '</div></div>';
    });
  }

  sidePanelEl.innerHTML = h;

  panelMinTimer = setTimeout(function(){ canClosePanel = true; }, 5000);
  panelTimeout = setTimeout(function(){
    if (!mouseInPanel) closeSidePanel();
  }, 10000);
}

function closeSidePanel() {
  if (!panelOpen) return;
  panelOpen = false;
  clearTimeout(panelTimeout);
  clearTimeout(panelMinTimer);
  var cl = sidePanelEl.className;
  sidePanelEl.className = cl.indexOf('right') !== -1 ? 'closed-right' : 'closed-left';
}

window.__closePanel = closeSidePanel;

sidePanelEl.addEventListener('mouseenter', function(){
  mouseInPanel = true;
  clearTimeout(panelTimeout);
});
sidePanelEl.addEventListener('mouseleave', function(){
  mouseInPanel = false;
  if (panelOpen && canClosePanel) {
    closeSidePanel();
  } else if (panelOpen) {
    panelTimeout = setTimeout(function(){
      if (!mouseInPanel) closeSidePanel();
    }, 3000);
  }
});

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

renderer.domElement.addEventListener('mousemove', onMouseMove);
renderer.domElement.addEventListener('click', onClickGlobe);

// Touch
renderer.domElement.addEventListener('touchend', function(e){
  if (e.changedTouches.length === 1) {
    var t = e.changedTouches[0];
    onClickGlobe({ clientX: t.clientX, clientY: t.clientY });
  }
}, { passive: true });

/* ───────────────────────────────── ANIMATION ───────────────────────────────── */
var clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  var t = clock.getElapsedTime();
  controls.update();

  partnerDots.forEach(function(pd, i){
    var s = 1 + 0.3 * Math.sin(t * 1.5 + i * 0.7);
    pd.ring.scale.set(s, s, s);
    pd.glow.material.opacity = 0.1 + 0.08 * Math.sin(t * 2 + i);
  });

  if (cytoPoints) {
    cytoPoints.rotation.y = t * 0.02;
    cytoPoints.rotation.x = t * 0.01;
  }

  // ── NUCLEUS PULSE ──
  if (nucleusCore) {
    var pulse = 0.35 + 0.15 * Math.sin(t * 1.2);
    nucleusCore.material.opacity = pulse;
    var cs = 1.0 + 0.12 * Math.sin(t * 1.2);
    nucleusCore.scale.set(cs, cs, cs);
  }
  if (nucleusGlow) {
    var gs = 1.0 + 0.08 * Math.sin(t * 0.8 + 0.5);
    nucleusGlow.scale.set(gs, gs, gs);
  }
  if (nucleusHalo) {
    var hs = 1.0 + 0.05 * Math.sin(t * 0.6);
    nucleusHalo.scale.set(hs, hs, hs);
  }
  if (coreLight) {
    coreLight.intensity = 0.5 + 0.2 * Math.sin(t * 1.2);
  }

  // ── CONTINENT GLOW PULSE (light breathing through the land) ──
  if (geoLoaded) {
    var glowPulse = 0.03 + 0.02 * Math.sin(t * 0.9);
    for (var code in countryDataMap) {
      var d = countryDataMap[code];
      if (d.reliéfMeshes && !d.elevated) {
        d.reliéfMeshes.forEach(function(m){
          m.material.opacity = glowPulse;
        });
      }
    }
  }

  renderer.render(scene, camera);
}
animate();

/* ─── RESIZE ─── */
window.addEventListener('resize', function(){
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

var currentLang = 'fr';

function t(key) {
  return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.fr[key]) || key;
}

function applyI18n(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var key = el.getAttribute('data-i18n');
    var val = t(key);
    if (val) el.textContent = val;
  });
  document.documentElement.lang = lang;
}

});
